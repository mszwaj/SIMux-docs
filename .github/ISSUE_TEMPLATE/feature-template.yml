name: New Feature Request
description: Request a new feature or enhancement
title: "[FEATURE] "
labels: ["feature", "need-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please fill out the form below.

  - type: checkboxes
    id: area
    attributes:
      label: Which part of the project does this feature pertain to?
      options:
        - Hardware
        - Firmware
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: hw-version
    attributes:
      label: Hardware Version
      description: PCB revision/version number
      placeholder: "e.g., v0.6.6"
    validations:
      required: false

  - type: input
    id: fw-version
    attributes:
      label: Firmware Version
      description: Firmware version number
      placeholder: "e.g., v0.6.4"
    validations:
      required: false

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the feature you are requesting
      placeholder: Describe the feature you would like to see
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What you expected to happen
      placeholder: Describe what should happen
    validations:
      required: false

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: Describe a specific use case or scenario where this feature would be valuable
      placeholder: Explain how you would use this feature
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context, diagrams, or references
      placeholder: Attach sketches, datasheets, example implementations, etc.
    validations:
      required: false
